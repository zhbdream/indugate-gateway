name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'

      - name: Go test
        run: go test ./...

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Frontend build
        working-directory: web
        run: |
          npm install
          npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Docker build
        run: docker build -f deployments/docker/Dockerfile -t indugate/gateway:ci .

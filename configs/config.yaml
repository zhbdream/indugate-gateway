server:
  host: "0.0.0.0"
  port: 8080
  mode: debug
  read_timeout: 30
  write_timeout: 30

log:
  level: info
  format: console
  output_path: stdout

database:
  driver: sqlite
  dsn: "./data/indugate.db"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

mcp:
  enabled: true
  base_path: "/mcp"

simulator:
  opcua:
    host: "0.0.0.0"
    port: 4840
    auto_start: false
